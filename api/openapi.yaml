openapi: 3.0.0

info:
  version: 1.0.0
  title: MediaMTX API
  description: API of MediaMTX, a server and proxy that supports various protocols.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:9997

security: []

components:
  schemas:
    HLSVariant:
      type: string
      enum: [mpegts, fmp4, lowLatency]

    LogDestination:
      type: string
      enum: [stdout, file, syslog]

    LogLevel:
      type: string
      enum: [error, warn, info, debug]

    RTSPAuthMethod:
      type: string
      enum: [basic, digest]

    RTSPTransport:
      type: string
      enum: [udp, multicast, tcp, automatic]

    PathTrackCodecProps:
      oneOf:
        - $ref: "#/components/schemas/PathTrackCodecPropsAV1"
        - $ref: "#/components/schemas/PathTrackCodecPropsVP9"
        - $ref: "#/components/schemas/PathTrackCodecPropsH265"
        - $ref: "#/components/schemas/PathTrackCodecPropsH264"
        - $ref: "#/components/schemas/PathTrackCodecPropsOpus"
        - $ref: "#/components/schemas/PathTrackCodecPropsMPEG4Audio"
        - $ref: "#/components/schemas/PathTrackCodecPropsAC3"
        - $ref: "#/components/schemas/PathTrackCodecPropsG711"
        - $ref: "#/components/schemas/PathTrackCodecPropsLPCM"

    ErrorStatus:
      type: string
      enum:
        - error

    AlwaysAvailableTrackCodec:
      type: string
      enum:
        - AV1
        - VP9
        - H265
        - H264
        - MPEG4Audio
        - Opus
        - G711
        - LPCM

    AuthAction:
      type: string
      enum:
        - publish
        - read
        - playback
        - api
        - metrics
        - pprof

    AuthMethod:
      type: string
      enum:
        - internal
        - http
        - jwt

    Encryption:
      type: string
      enum:
        - "no"
        - optional
        - strict

    MoQSessionState:
      type: string
      enum:
        - idle
        - read
        - publish

    OKStatus:
      type: string
      enum:
        - ok

    PathReaderType:
      type: string
      enum:
        - hlsSession
        - rtmpConn
        - rtmpsConn
        - rtspConn
        - rtspSession
        - rtspsConn
        - rtspsSession
        - srtConn
        - webRTCSession
        - moqSession
        - hidden

    PathSourceType:
      type: string
      enum:
        - hlsSource
        - redirect
        - rpiCameraSource
        - rtmpConn
        - rtmpsConn
        - rtmpSource
        - rtspSession
        - rtspSource
        - rtspsSession
        - srtConn
        - srtSource
        - mpegtsSource
        - rtpSource
        - webRTCSession
        - webRTCSource
        - moqSession

    PathTrackCodec:
      type: string
      enum:
        - AV1
        - VP9
        - VP8
        - H265
        - H264
        - MPEG-4 Video
        - MPEG-1/2 Video
        - M-JPEG
        - Opus
        - FLAC
        - Vorbis
        - MPEG-4 Audio
        - MPEG-4 Audio LATM
        - MPEG-1/2 Audio
        - AC3
        - Speex
        - G726
        - G722
        - G711
        - LPCM
        - MPEG-TS
        - KLV
        - Generic

    RTMPConnState:
      type: string
      enum:
        - idle
        - read
        - publish

    RTSPRangeType:
      type: string
      enum:
        - ""
        - clock
        - npt
        - smpte

    RTSPSessionState:
      type: string
      enum:
        - idle
        - read
        - publish

    RecordFormat:
      type: string
      enum:
        - fmp4
        - mpegts

    SRTConnState:
      type: string
      enum:
        - idle
        - read
        - publish

    WebRTCSessionState:
      type: string
      enum:
        - read
        - publish

    AlwaysAvailableTrack:
      type: object
      properties:
        channelCount:
          type: integer
          format: int64
        codec:
          $ref: "#/components/schemas/AlwaysAvailableTrackCodec"
        muLaw:
          type: boolean
        sampleRate:
          type: integer
          format: int64

    AuthInternalUser:
      type: object
      properties:
        ips:
          type: array
          items:
            type: string
        pass:
          type: string
        permissions:
          type: array
          items:
