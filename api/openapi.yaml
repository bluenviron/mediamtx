openapi: 3.0.0

info:
  version: 1.0.0
  title: MediaMTX API
  description: API of MediaMTX, a server and proxy that supports various protocols.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:9997

security: []

components:
  schemas:
    OKStatus:
      type: string
      enum: [ok]

    ErrorStatus:
      type: string
      enum: [error]

    PathSourceType:
      type: string
      enum:
      - hlsSource
      - redirect
      - rpiCameraSource
      - rtmpConn
      - rtmpsConn
      - rtmpSource
      - rtspSession
      - rtspSource
      - rtspsSession
      - srtConn
      - srtSource
      - mpegtsSource
      - rtpSource
      - webRTCSession
      - webRTCSource

    PathReaderType:
      type: string
      enum:
      - hlsMuxer
      - rpiCameraSecondary
      - rtmpConn
      - rtmpsConn
      - rtspConn
      - rtspSession
      - rtspsConn
      - rtspsSession
      - srtConn
      - webRTCSession

    PathTrackCodec:
      type: string
      enum:
      - AV1
      - VP9
      - VP8
      - H265
      - H264
      - MPEG-4 Video
      - MPEG-1/2 Video
      - M-JPEG
      - Opus
      - Vorbis
      - MPEG-4 Audio
      - MPEG-4 Audio LATM
      - MPEG-1/2 Audio
      - AC3
      - Speex
      - G726
      - G722
      - G711
      - LPCM
      - MPEG-TS
      - KLV
      - Generic

    AlwaysAvailableTrackCodec:
      type: string
      enum:
      - AV1
      - VP9
      - H265
      - H264
      - MPEG4Audio
      - Opus
      - G711
      - LPCM

    AuthAction:
      type: string
      enum:
      - publish
      - read
      - playback
      - api
      - metrics
      - pprof

    AuthMethod:
      type: string
      enum: [internal, http, jwt]

    Encryption:
      type: string
      enum: [no, optional, strict]

    HLSVariant:
      type: string
      enum: [mpegts, fmp4, lowLatency]

    LogDestination:
      type: string
      enum: [stdout, file, syslog]

    LogLevel:
      type: string
      enum: [error, warn, info, debug]

    RecordFormat:
      type: string
      enum: [fmp4, mpegts]

    RTSPAuthMethod:
      type: string
      enum: [basic, digest]

    RTSPRangeType:
      type: string
      enum: ['', clock, npt, smpte]

    RTSPTransport:
      type: string
      enum: [udp, multicast, tcp, automatic]

    RTMPConnState:
      type: string
      enum: [idle, read, publish]

    RTSPSessionState:
      type: string
      enum: [idle, read, publish]

    SRTConnState:
      type: string
      enum: [idle, read, publish]

    WebRTCSessionState:
      type: string
      enum: [read, publish]

    OK:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/OKStatus'

    Error:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ErrorStatus'
        error:
          type: string

    Info:
      type: object
      properties:
        version:
          type: string
        started:
          type: string

    AuthInternalUser:
      type: object
      properties:
        user:
          type: string
        pass:
          type: string
        ips:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/AuthInternalUserPermission'

    AuthInternalUserPermission:
      type: object
      properties:
        action:
          $ref: '#/components/schemas/AuthAction'
        path:
          type: string

    GlobalConf:
      type: object
      properties:
        # General
        logLevel:
          $ref: '#/components/schemas/LogLevel'
        logDestinations:
          type: array
          items:
            $ref: '#/components/schemas/LogDestination'
        logStructured:
          type: boolean
        logFile:
          type: string
        sysLogPrefix:
          type: string
        dumpPackets:
          type: boolean
        readTimeout:
          type: string
        writeTimeout:
          type: string
        readBufferCount:
          type: integer
          format: int64
          nullable: true
          deprecated: true
        writeQueueSize:
          type: integer
          format: int64
        udpMaxPayloadSize:
          type: integer
          format: int64
        udpReadBufferSize:
          type: integer
          format: uint64
        runOnConnect:
          type: string
        runOnConnectRestart:
          type: boolean
        runOnDisconnect:
          type: string

        # Authentication
        authMethod:
          $ref: '#/components/schemas/AuthMethod'
        authInternalUsers:
          type: array
          items:
            $ref: '#/components/schemas/AuthInternalUser'
        authHTTPAddress:
          type: string
        externalAuthenticationURL:
          type: string
          nullable: true
          deprecated: true
        authHTTPFingerprint:
          type: string
        authHTTPExclude:
          type: array
          items:
            $ref: '#/components/schemas/AuthInternalUserPermission'
        authJWTJWKS:
          type: string
        authJWTJWKSFingerprint:
          type: string
        authJWTClaimKey:
          type: string
        authJWTInHTTPQuery:
          type: boolean
          nullable: true
          deprecated: true
        authJWTIssuer:
          type: string
        authJWTAudience:
          type: string
        authJWTExclude:
          type: array
          items:
            $ref: '#/components/schemas/AuthInternalUserPermission'

        # Control API
        api:
          type: boolean
        apiAddress:
          type: string
        apiEncryption:
          type: boolean
        apiServerKey:
          type: string
        apiServerCert:
          type: string
        apiAllowOrigin:
          type: string
          nullable: true
          deprecated: true
        apiAllowOrigins:
          type: array
          items:
            type: string
        apiTrustedProxies:
          type: array
          items:
            type: string

        # Metrics
        metrics:
          type: boolean
        metricsAddress:
          type: string
        metricsEncryption:
          type: boolean
        metricsServerKey:
          type: string
        metricsServerCert:
          type: string
        metricsAllowOrigin:
          type: string
          nullable: true
          deprecated: true
        metricsAllowOrigins:
          type: array
          items:
            type: string
        metricsTrustedProxies:
          type: array
          items:
            type: string

        # PPROF
        pprof:
          type: boolean
        pprofAddress:
          type: string
        pprofEncryption:
          type: boolean
        pprofServerKey:
          type: string
        pprofServerCert:
          type: string
        pprofAllowOrigin:
          type: string
          nullable: true
          deprecated: true
        pprofAllowOrigins:
          type: array
          items:
            type: string
        pprofTrustedProxies:
          type: array
          items:
            type: string

        # Playback server
        playback:
          type: boolean
        playbackAddress:
          type: string
        playbackEncryption:
          type: boolean
        playbackServerKey:
          type: string
        playbackServerCert:
          type: string
        playbackAllowOrigin:
          type: string
          nullable: true
          deprecated: true
        playbackAllowOrigins:
          type: array
          items:
            type: string
        playbackTrustedProxies:
          type: array
          items:
            type: string

        # RTSP server
        rtsp:
          type: boolean
        rtspDisable:
          type: boolean
          nullable: true
          deprecated: true
        protocols:
          type: array
          nullable: true
          items:
            type: string
            enum: [udp, multicast, tcp]
          deprecated: true
        rtspTransports:
          type: array
          items:
            type: string
            enum: [udp, multicast, tcp]
        encryption:
          type: string
          nullable: true
          deprecated: true
          allOf:
            - $ref: '#/components/schemas/Encryption'
        rtspEncryption:
          $ref: '#/components/schemas/Encryption'
        rtspAddress:
          type: string
        rtspsAddress:
          type: string
        rtpAddress:
          type: string
        rtcpAddress:
          type: string
        multicastIPRange:
          type: string
        multicastRTPPort:
          type: integer
          format: int64
        multicastRTCPPort:
          type: integer
          format: int64
        srtpAddress:
          type: string
        srtcpAddress:
          type: string
        multicastSRTPPort:
          type: integer
          format: int64
        multicastSRTCPPort:
          type: integer
          format: int64
        rtspServerKey:
          type: string
        rtspServerCert:
          type: string
        authMethods:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/RTSPAuthMethod'
          deprecated: true
        rtspAuthMethods:
          type: array
          items:
            $ref: '#/components/schemas/RTSPAuthMethod'
        rtspUDPReadBufferSize:
          type: integer
          format: uint64
          nullable: true
          deprecated: true

        # RTMP server
        rtmp:
          type: boolean
        rtmpDisable:
          type: boolean
          nullable: true
          deprecated: true
        rtmpEncryption:
          $ref: '#/components/schemas/Encryption'
        rtmpAddress:
          type: string
        rtmpsAddress:
          type: string
        rtmpServerKey:
          type: string
        rtmpServerCert:
          type: string

        # HLS server
        hls:
          type: boolean
        hlsDisable:
          type: boolean
          nullable: true
          deprecated: true
        hlsAddress:
          type: string
        hlsEncryption:
          type: boolean
        hlsServerKey:
          type: string
        hlsServerCert:
          type: string
        hlsAllowOrigin:
          type: string
          nullable: true
          deprecated: true
        hlsAllowOrigins:
          type: array
          items:
            type: string
        hlsTrustedProxies:
          type: array
          items:
            type: string
        hlsAlwaysRemux:
          type: boolean
        hlsVariant:
          $ref: '#/components/schemas/HLSVariant'
        hlsSegmentCount:
          type: integer
          format: int64
        hlsSegmentDuration:
          type: string
        hlsPartDuration:
          type: string
        hlsSegmentMaxSize:
          type: string
        hlsDirectory:
          type: string
        hlsMuxerCloseAfter:
          type: string

        # WebRTC server
        webrtc:
          type: boolean
        webrtcDisable:
          type: boolean
          nullable: true
          deprecated: true
        webrtcAddress:
          type: string
        webrtcEncryption:
          type: boolean
        webrtcServerKey:
          type: string
        webrtcServerCert:
          type: string
        webrtcAllowOrigin:
          type: string
          nullable: true
          deprecated: true
        webrtcAllowOrigins:
          type: array
          items:
            type: string
        webrtcTrustedProxies:
          type: array
          items:
            type: string
        webrtcLocalUDPAddress:
          type: string
        webrtcLocalTCPAddress:
          type: string
        webrtcIPsFromInterfaces:
          type: boolean
        webrtcIPsFromInterfacesList:
          type: array
          items:
            type: string
        webrtcAdditionalHosts:
          type: array
          items:
            type: string
        webrtcICEServers2:
          type: array
          items:
            $ref: '#/components/schemas/WebRTCICEServer'
        webrtcSTUNGatherTimeout:
          type: string
        webrtcHandshakeTimeout:
          type: string
        webrtcTrackGatherTimeout:
          type: string
        webrtcICEUDPMuxAddress:
          type: string
          nullable: true
          deprecated: true
        webrtcICETCPMuxAddress:
          type: string
          nullable: true
          deprecated: true
        webrtcICEHostNAT1To1IPs:
          type: array
          nullable: true
          items:
            type: string
          deprecated: true
        webrtcICEServers:
          type: array
          nullable: true
          items:
            type: string
          deprecated: true

        # SRT server
        srt:
          type: boolean
        srtAddress:
          type: string

        # Record (deprecated)
        record:
          type: boolean
          nullable: true
          deprecated: true
        recordPath:
          type: string
          nullable: true
          deprecated: true
        recordFormat:
          type: string
          nullable: true
          deprecated: true
          allOf:
            - $ref: '#/components/schemas/RecordFormat'
        recordPartDuration:
          type: string
          nullable: true
          deprecated: true
        recordSegmentDuration:
          type: string
          nullable: true
          deprecated: true
        recordDeleteAfter:
          type: string
          nullable: true
          deprecated: true

    PathConf:
      type: object
      properties:
        name:
          type: string

        # General
        source:
          type: string
        sourceFingerprint:
          type: string
        sourceOnDemand:
          type: boolean
        sourceOnDemandStartTimeout:
          type: string
        sourceOnDemandCloseAfter:
          type: string
        maxReaders:
          type: integer
          format: int64
        srtReadPassphrase:
          type: string
        fallback:
          type: string
          nullable: true
          deprecated: true
        useAbsoluteTimestamp:
          type: boolean

        # Always available
        alwaysAvailable:
          type: boolean
        alwaysAvailableTracks:
          type: array
          items:
            $ref: '#/components/schemas/AlwaysAvailableTrack'
        alwaysAvailableFile:
          type: string

        # Record
        record:
          type: boolean
        playback:
          type: boolean
          nullable: true
          deprecated: true
        recordPath:
          type: string
        recordFormat:
          $ref: '#/components/schemas/RecordFormat'
        recordPartDuration:
          type: string
        recordMaxPartSize:
          type: string
        recordSegmentDuration:
          type: string
        recordDeleteAfter:
          type: string

        # Authentication (deprecated)
        publishUser:
          type: string
          nullable: true
          deprecated: true
        publishPass:
          type: string
          nullable: true
          deprecated: true
        publishIPs:
          type: array
          nullable: true
          items:
            type: string
          deprecated: true
        readUser:
          type: string
          nullable: true
          deprecated: true
        readPass:
          type: string
          nullable: true
          deprecated: true
        readIPs:
          type: array
          nullable: true
          items:
            type: string
          deprecated: true

        # Publisher source
        overridePublisher:
          type: boolean
        disablePublisherOverride:
          type: boolean
          nullable: true
          deprecated: true
        srtPublishPassphrase:
          type: string
        rtspDemuxMpegts:
          type: boolean

        # RTSP source
        rtspTransport:
          $ref: '#/components/schemas/RTSPTransport'
        rtspAnyPort:
          type: boolean
        sourceProtocol:
          type: string
          nullable: true
          deprecated: true
          allOf:
            - $ref: '#/components/schemas/RTSPTransport'
        sourceAnyPortEnable:
          type: boolean
          nullable: true
          deprecated: true
        rtspRangeType:
          $ref: '#/components/schemas/RTSPRangeType'
        rtspRangeStart:
          type: string
        rtspUDPReadBufferSize:
          type: integer
          format: uint64
          nullable: true
          deprecated: true
        rtspUDPSourcePortRange:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: integer
            format: uint64

        # MPEG-TS source
        mpegtsUDPReadBufferSize:
          type: integer
          format: uint64
          nullable: true
          deprecated: true

        # RTP source
        rtpSDP:
          type: string
        rtpUDPReadBufferSize:
          type: integer
          format: uint64
          nullable: true
          deprecated: true

        # WHEP source
        whepBearerToken:
          type: string
        whepSTUNGatherTimeout:
          type: string
        whepHandshakeTimeout:
          type: string
        whepTrackGatherTimeout:
          type: string

        # Redirect source
        sourceRedirect:
          type: string

        # Raspberry Pi Camera source
        rpiCameraCamID:
          type: integer
          format: uint64
        rpiCameraSecondary:
          type: boolean
        rpiCameraWidth:
          type: integer
          format: uint64
        rpiCameraHeight:
          type: integer
          format: uint64
        rpiCameraHFlip:
          type: boolean
        rpiCameraVFlip:
          type: boolean
        rpiCameraBrightness:
          type: number
          format: double
        rpiCameraContrast:
          type: number
          format: double
        rpiCameraSaturation:
          type: number
          format: double
        rpiCameraSharpness:
          type: number
          format: double
        rpiCameraExposure:
          type: string
        rpiCameraAWB:
          type: string
        rpiCameraAWBGains:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
            format: double
        rpiCameraDenoise:
          type: string
        rpiCameraShutter:
          type: integer
          format: uint64
        rpiCameraMetering:
          type: string
        rpiCameraGain:
          type: number
          format: double
        rpiCameraEV:
          type: number
          format: double
        rpiCameraROI:
          type: string
        rpiCameraHDR:
          type: boolean
        rpiCameraTuningFile:
          type: string
        rpiCameraMode:
          type: string
        rpiCameraFPS:
          type: number
          format: double
        rpiCameraAfMode:
          type: string
        rpiCameraAfRange:
          type: string
        rpiCameraAfSpeed:
          type: string
        rpiCameraLensPosition:
          type: number
          format: double
        rpiCameraAfWindow:
          type: string
        rpiCameraFlickerPeriod:
          type: integer
          format: uint64
        rpiCameraTextOverlayEnable:
          type: boolean
        rpiCameraTextOverlay:
          type: string
        rpiCameraCodec:
          type: string
        rpiCameraIDRPeriod:
          type: integer
          format: uint64
        rpiCameraBitrate:
          type: integer
          format: uint64
        rpiCameraProfile:
          type: string
          nullable: true
          deprecated: true
        rpiCameraLevel:
          type: string
          nullable: true
          deprecated: true
        rpiCameraHardwareH264Profile:
          type: string
        rpiCameraHardwareH264Level:
          type: string
        rpiCameraSoftwareH264Profile:
          type: string
        rpiCameraSoftwareH264Level:
          type: string
        rpiCameraJPEGQuality:
          type: integer
          format: uint64
          nullable: true
          deprecated: true
        rpiCameraMJPEGQuality:
          type: integer
          format: uint64

        # Hooks
        runOnInit:
          type: string
        runOnInitRestart:
          type: boolean
        runOnDemand:
          type: string
        runOnDemandRestart:
          type: boolean
        runOnDemandStartTimeout:
          type: string
        runOnDemandCloseAfter:
          type: string
        runOnUnDemand:
          type: string
        runOnReady:
          type: string
        runOnReadyRestart:
          type: boolean
        runOnNotReady:
          type: string
        runOnRead:
          type: string
        runOnReadRestart:
          type: boolean
        runOnUnread:
          type: string
        runOnRecordSegmentCreate:
          type: string
        runOnRecordSegmentComplete:
          type: string

    PathConfList:
      type: object
      properties:
        pageCount:
          type: integer
          format: int64
        itemCount:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/PathConf'

    Path:
      type: object
      properties:
        name:
          type: string
        confName:
          type: string
        source:
          type: object
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PathSource'
        ready:
          type: boolean
          deprecated: true
        readyTime:
          type: string
          nullable: true
          deprecated: true
        available:
          type: boolean
        availableTime:
          type: string
          nullable: true
        online:
          type: boolean
        onlineTime:
          type: string
          nullable: true
        tracks:
          type: array
          deprecated: true
          items:
            $ref: '#/components/schemas/PathTrackCodec'
        tracks2:
          type: array
          items:
            $ref: '#/components/schemas/PathTrack'
        inboundBytes:
          type: integer
          format: uint64
        outboundBytes:
          type: integer
          format: uint64
        inboundFramesInError:
          type: integer
          format: uint64
        bytesReceived:
          type: integer
          format: uint64
          deprecated: true
        bytesSent:
          type: integer
          format: uint64
          deprecated: true
        readers:
          type: array
          items:
            $ref: '#/components/schemas/PathReader'

    PathList:
      type: object
      properties:
        pageCount:
          type: integer
          format: int64
        itemCount:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/Path'

    PathSource:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/PathSourceType'
        id:
          type: string

    PathReader:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/PathReaderType'
        id:
          type: string

    PathTrack:
      type: object
      properties:
        codec:
          $ref: '#/components/schemas/PathTrackCodec'
        codecProps:
          type: object
          nullable: true
          allOf:
          - $ref: '#/components/schemas/PathTrackCodecProps'

    PathTrackCodecProps:
      oneOf:
      - $ref: '#/components/schemas/PathTrackCodecPropsAV1'
      - $ref: '#/components/schemas/PathTrackCodecPropsVP9'
      - $ref: '#/components/schemas/PathTrackCodecPropsH265'
      - $ref: '#/components/schemas/PathTrackCodecPropsH264'
      - $ref: '#/components/schemas/PathTrackCodecPropsOpus'
      - $ref: '#/components/schemas/PathTrackCodecPropsMPEG4Audio'
      - $ref: '#/components/schemas/PathTrackCodecPropsAC3'
      - $ref: '#/components/schemas/PathTrackCodecPropsG711'
      - $ref: '#/components/schemas/PathTrackCodecPropsLPCM'

    PathTrackCodecPropsAV1:
      type: object
      properties:
        width:
          type: integer
          format: int64
        height:
          type: integer
          format: int64
        profile:
          type: integer
          format: int64
        level:
          type: integer
          format: int64
        tier:
          type: integer
          format: int64
    PathTrackCodecPropsVP9:
      type: object
      properties:
        profile:
          type: integer
          format: int64

    PathTrackCodecPropsH265:
      type: object
      properties:
        width:
          type: integer
          format: int64
        height:
          type: integer
          format: int64
        profile:
          type: string
        level:
          type: string

    PathTrackCodecPropsH264:
      type: object
      properties:
        width:
          type: integer
          format: int64
        height:
          type: integer
          format: int64
        profile:
          type: string
        level:
          type: string

    PathTrackCodecPropsOpus:
      type: object
      properties:
        channelCount:
          type: integer
          format: int64

    PathTrackCodecPropsMPEG4Audio:
      type: object
      properties:
        sampleRate:
          type: integer
          format: int64
        channelCount:
          type: integer
          format: int64

    PathTrackCodecPropsAC3:
      type: object
      properties:
        sampleRate:
          type: integer
          format: int64
        channelCount:
          type: integer
          format: int64

    PathTrackCodecPropsG711:
      type: object
      properties:
        muLaw:
          type: boolean
        sampleRate:
          type: integer
          format: int64
        channelCount:
          type: integer
          format: int64

    PathTrackCodecPropsLPCM:
      type: object
      properties:
        bitDepth:
          type: integer
          format: int64
        sampleRate:
          type: integer
          format: int64
        channelCount:
          type: integer
          format: int64

    HLSMuxer:
      type: object
      properties:
        path:
          type: string
        created:
          type: string
        lastRequest:
          type: string
        outboundBytes:
          type: integer
          format: uint64
        outboundFramesDiscarded:
          type: integer
          format: uint64
        bytesSent:
          type: integer
          format: uint64
          deprecated: true

    HLSMuxerList:
      type: object
      properties:
        pageCount:
          type: integer
          format: int64
        itemCount:
          type: integer
          format: int64
        items:
          type: array
          items:
