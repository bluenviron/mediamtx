<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Arial", sans-serif;
      }
      #video {
        width: 100%;
        height: 100%;
        background: rgb(30, 30, 30);
        position: relative;
      }
      #video canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      #mute {
        position: absolute;
        bottom: 40px;
        right: 40px;
        width: 60px;
        height: 60px;
        background-image: url("data:image/svg+xml,%3C%3Fxml version='1.0' encoding='UTF-8'%3F%3E%3Csvg id='Layer_1' data-name='Layer 1' xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Cdefs%3E%3Cstyle%3E .cls-1 %7B fill: %23fff; %7D .cls-2 %7B fill: %23cdcfd0; %7D %3C/style%3E%3C/defs%3E%3Cline class='cls-1' x1='20.08' y1='20.08' x2='279.92' y2='279.92'/%3E%3Cg%3E%3Cpath class='cls-2' d='M199.86,150.24c0,7.59-1.21,15.03-3.5,22.07l8.33,8.33c3.81-9.55,5.85-19.84,5.85-30.4,0-27.34-13.54-52.81-36.23-68.14l-5.97,8.84c19.74,13.34,31.53,35.51,31.53,59.3Z'/%3E%3Cpath class='cls-2' d='M177.82,201.87c-2.73,2.62-5.67,5.04-8.84,7.22l6.07,8.77c3.69-2.55,7.13-5.39,10.31-8.45l-7.54-7.54Z'/%3E%3C/g%3E%3Crect class='cls-2' x='141.5' y='-33.74' width='17' height='367.48' transform='translate(-62.13 150) rotate(-45)'/%3E%3Cg%3E%3Cpath class='cls-2' d='M231.75,150.24c0,16.38-4.22,31.98-11.88,45.59l7.81,7.81c9.49-15.77,14.75-34.1,14.75-53.39,0-39.5-21.98-74.98-57.35-92.6l-4.76,9.55c31.73,15.81,51.44,47.63,51.44,83.05Z'/%3E%3Cpath class='cls-2' d='M197.89,221.93c-5.34,4.36-11.21,8.19-17.58,11.36l4.76,9.55c7.42-3.7,14.24-8.19,20.4-13.33l-7.58-7.58Z'/%3E%3C/g%3E%3Cg%3E%3Cpath class='cls-2' d='M260.74,150c0,24.2-7.65,46.96-21.11,65.59l7.56,7.56c.91-1.22,1.8-2.46,2.67-3.72,14.1-20.47,21.55-44.48,21.55-69.43s-7.45-48.96-21.55-69.43c-13.77-19.99-32.91-35.32-55.35-44.34l-3.98,9.9c42.65,17.13,70.2,57.9,70.2,103.86Z'/%3E%3Cpath class='cls-2' d='M215.73,239.78c-7.63,5.66-16.06,10.42-25.2,14.09l3.98,9.9c10.38-4.17,20.04-9.7,28.8-16.41l-7.58-7.58Z'/%3E%3C/g%3E%3Cg%3E%3Cpolygon class='cls-2' points='146.6 124.61 146.6 54.28 111.14 89.14 146.6 124.61'/%3E%3Cpolygon class='cls-2' points='80.49 106.57 28.59 106.57 28.59 201.95 85.17 201.95 146.6 254.25 146.6 172.69 80.49 106.57'/%3E%3C/g%3E%3C/svg%3E");
        background-size: 80%;
        background-position: center;
        background-repeat: no-repeat;
        cursor: pointer;
        display: none;
      }
      #message {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        text-align: center;
        justify-content: center;
        font-size: 16px;
        font-weight: bold;
        color: white;
        pointer-events: none;
        padding: 20px;
        box-sizing: border-box;
        text-shadow: 0 0 5px black;
      }
    </style>
    <script defer src="./reader.js"></script>
  </head>
  <body>
    <div id="video"></div>
    <div id="mute"></div>
    <div id="message"></div>

    <script>
      const message = document.getElementById("message");
      const mute = document.getElementById("mute");

      let reader = null;

      const setMessage = (str) => {
        message.innerText = str;
      };

      window.addEventListener("load", () => {
        fetch(new URL("authmirror", window.location.href))
          .then((r) => (r.status !== 200 ? null : r.json()))
          .then((creds) => {
            reader = new MediaMTXMoQReader({
              fingerprintUrl: new URL("fingerprint", window.location.href),
              url:
                new URL("moq", window.location.href) + window.location.search,
              user: creds?.user,
              pass: creds?.pass,
              videoElement: document.getElementById("video"),
              onError: (err) => {
                setMessage(err);
              },
              onSubscribed: (hasAudio) => {
                setMessage("");
              },
              onAudioMuted: (muted) => {
                mute.style.display = muted ? "block" : "none";
              },
            });
          })
          .catch((err) => {
            setMessage("Failed to fetch credentials: " + err);
          });
      });

      mute.addEventListener("click", () => {
        if (reader !== null) {
          reader.unmute();
        }
      });
    </script>
  </body>
</html>
