name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - run: go generate ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  go_mod:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - run: make lint-go-mod

  conf:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - run: make lint-conf

  docslinks:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - run: make lint-docslinks

  docsorder:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - run: make lint-docsorder

  apidocs:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - run: make lint-apidocs

  other:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - run: make lint-other
