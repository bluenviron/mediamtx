name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test_64:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: make test

      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test_32:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: make test-32

  test_e2e:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"

      - run: make test-e2e-nodocker
